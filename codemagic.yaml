workflows:
  ios-native-quick-start:
    name: iOS Native
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Heart Rate

    environment:
      groups:
        - app_secrets
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.heart.rate.usus
      vars:
        BUNDLE_ID: "com.heart.rate.usus"
        XCODE_PROJECT: "Heart Rate.xcodeproj"
        XCODE_SCHEME: "Heart Rate"
        APP_STORE_APPLE_ID: "6755386024"

    scripts:
      - name: Create Secrets.plist
        script: |
          set -e

          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ERROR: ANTHROPIC_API_KEY is empty. Add it in Codemagic Environment variables as a secure variable."
            exit 1
          fi

          cat > "$CM_BUILD_DIR/Heart Rate/Secrets.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>ANTHROPIC_API_KEY</key>
              <string>$ANTHROPIC_API_KEY</string>
          </dict>
          </plist>
          EOF

          echo "Secrets.plist created at: $CM_BUILD_DIR/Heart Rate/Secrets.plist"

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Verify build number in project
        script: |
          set -x
          grep -n "MARKETING_VERSION" "$CM_BUILD_DIR/$XCODE_PROJECT/project.pbxproj"
          grep -n "CURRENT_PROJECT_VERSION" "$CM_BUILD_DIR/$XCODE_PROJECT/project.pbxproj"

      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

      - name: Verify Secrets.plist in IPA
        script: |
          set -e

          IPA_PATH=$(find "$CM_BUILD_DIR/build/ios/ipa" -name "*.ipa" -type f | head -n 1)

          if [ -z "$IPA_PATH" ]; then
            echo "ERROR: IPA file was not found."
            exit 1
          fi

          echo "Found IPA: $IPA_PATH"

          mkdir -p /tmp/ipa_check
          unzip -q "$IPA_PATH" -d /tmp/ipa_check

          APP_PATH=$(find /tmp/ipa_check/Payload -name "*.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app was not found inside IPA."
            exit 1
          fi

          echo "Found app bundle: $APP_PATH"

          if [ ! -f "$APP_PATH/Secrets.plist" ]; then
            echo "ERROR: Secrets.plist was NOT included in the app bundle."
            echo "The app will not be able to read ANTHROPIC_API_KEY via Bundle.main."
            exit 1
          fi

          echo "Secrets.plist is inside the IPA app bundle."

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
